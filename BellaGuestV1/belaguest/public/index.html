<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BelaGuest | Salão de Beleza</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <main class="container">
      <!-- Auth Section -->
      <section id="authSection" class="auth-section">
        <div class="auth-card">
          <div class="auth-header">
            <div class="logo">
              <i class="fas fa-spa"></i>
            </div>
            <h1>BelaGuest</h1>
            <p class="tagline">Sua beleza, nossa prioridade</p>
          </div>

          <div class="auth-tabs" id="authTabs">
            <button class="auth-tab active" data-auth-tab="login">
              <i class="fas fa-sign-in-alt"></i> Entrar
            </button>
            <button class="auth-tab" data-auth-tab="register">
              <i class="fas fa-user-plus"></i> Cadastrar
            </button>
          </div>

          <form id="loginForm" class="auth-form">
            <div class="input-group">
              <i class="fas fa-envelope"></i>
              <input type="email" name="email" placeholder="Seu e-mail" required />
            </div>
            <div class="input-group">
              <i class="fas fa-lock"></i>
              <input type="password" name="senha" placeholder="Sua senha" required />
            </div>
            <button type="submit" class="btn btn-primary btn-block">
              <i class="fas fa-arrow-right"></i> Entrar
            </button>
          </form>

          <form id="registerForm" class="auth-form hidden">
            <div class="input-group">
              <i class="fas fa-user"></i>
              <input type="text" name="nome" placeholder="Seu nome completo" required />
            </div>
            <div class="input-group">
              <i class="fas fa-envelope"></i>
              <input type="email" name="email" placeholder="Seu e-mail" required />
            </div>
            <div class="input-group">
              <i class="fas fa-lock"></i>
              <input type="password" name="senha" placeholder="Crie uma senha" minlength="6" required />
            </div>
            <button type="submit" class="btn btn-primary btn-block">
              <i class="fas fa-check"></i> Criar Conta
            </button>
          </form>

          <div class="auth-footer">
            <p>Versão de demonstração</p>
          </div>
        </div>
      </section>

      <!-- App Section -->
      <section id="appSection" class="app-section hidden">
        <header class="app-header">
          <div class="header-brand">
            <div class="brand-logo">
              <i class="fas fa-spa"></i>
            </div>
            <div class="brand-info">
              <h1>BelaGuest</h1>
              <p id="welcomeSubtitle"></p>
            </div>
          </div>
          <div class="header-user">
            <div class="user-info">
              <span id="welcomeTitle"></span>
              <span id="realtimeBadge" class="realtime-badge">
                <i class="fas fa-circle pulse"></i> Online
              </span>
            </div>
            <button id="logoutBtn" class="btn btn-logout">
              <i class="fas fa-sign-out-alt"></i> Sair
            </button>
          </div>
        </header>

        <div id="alert" class="alert hidden"></div>

        <nav class="main-nav">
          <div id="roleTabs" class="nav-tabs"></div>
        </nav>

        <section id="viewArea" class="view-area"></section>

        <footer class="app-footer">
          <p><i class="fas fa-heart"></i> BelaGuest - Transformando beleza em experiência</p>
        </footer>
      </section>
    </main>

    <script src="https://cdn.socket.io/4.8.1/socket.io.min.js" crossorigin="anonymous"></script>
    <script src="/app.js"></script>
  </body>
</html>
